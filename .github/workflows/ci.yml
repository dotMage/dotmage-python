name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  POETRY_VERSION: "2.3.4"
  POETRY_VIRTUALENVS_CREATE: "true"
  POETRY_VIRTUALENVS_IN_PROJECT: "true"

jobs:
  check-version:
    # Guard the version: a build must never reuse a version already on PyPI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version from pyproject.toml
        id: ver
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Declared version: $version"
      - name: Fail if version already published on PyPI
        run: |
          name="dotmage"
          version="${{ steps.ver.outputs.version }}"
          code=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/${name}/${version}/json")
          if [ "$code" = "200" ]; then
            echo "::error::Version ${version} is already published on PyPI. Bump the version."
            exit 1
          fi
          echo "Version ${version} is free to publish."

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - name: Install dependencies
        run: poetry install --no-root
      - name: Ruff check
        run: poetry run ruff check .
      - name: Ruff format check
        run: poetry run ruff format --check .
      - name: mypy
        run: poetry run mypy .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - name: Install dependencies
        run: poetry install
      - name: Run tests with coverage gate
        run: poetry run pytest
      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    needs: [check-version, lint, test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install Poetry
        run: pipx install "poetry==${POETRY_VERSION}"
      - name: Build distributions
        run: poetry build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing to PyPI
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
